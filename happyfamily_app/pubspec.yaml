name: happyfamily_app
description: Family location sharing app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP & networking
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1

  # Map - AMap (高德地图)
  amap_flutter_map: ^3.0.0
  amap_flutter_location: ^3.0.0

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI utilities
  cached_network_image: ^3.3.1
  fluttertoast: ^8.2.4

  # Permissions
  permission_handler: ^11.3.0

  # Utils
  intl: ^0.19.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
